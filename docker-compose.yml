version: "3.8"

services:
  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    restart: always
    ports:
      - "5678:5678"
    environment:
      # ── Core ──────────────────────────────────────────────────────
      - N8N_HOST=0.0.0.0
      - N8N_PORT=5678
      - N8N_PROTOCOL=https
      - WEBHOOK_URL=${N8N_PUBLIC_URL}          # e.g. https://your-app.railway.app
      - N8N_EDITOR_BASE_URL=${N8N_PUBLIC_URL}
      # ── Auth (set a strong password) ──────────────────────────────
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_USER}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_PASSWORD}
      # ── Persistence ───────────────────────────────────────────────
      - DB_TYPE=sqlite
      - N8N_USER_FOLDER=/home/node/.n8n
      # ── Execution ─────────────────────────────────────────────────
      - EXECUTIONS_PROCESS=main
      - N8N_METRICS=false
    volumes:
      - n8n_data:/home/node/.n8n

volumes:
  n8n_data:
